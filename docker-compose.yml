name: savemystomach

# Runs on Unraid (kiwi). Caddy on VPS proxies savemystomach.keanuc.net → kiwi:8910.
# Image built by GitHub Actions → GHCR.
# Komodo Auto Update pulls latest image on push.

services:
  web:
    image: ghcr.io/keanucz/savemystomach:latest
    container_name: savemystomach
    restart: unless-stopped
    ports:
      - "8910:3000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${SAVEMYSTOMACH_NEO4J_PASSWORD}
      KIMCHI_BASE_URL: ${SAVEMYSTOMACH_KIMCHI_BASE_URL}
      KIMCHI_API_KEY: ${SAVEMYSTOMACH_KIMCHI_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - savemystomach

  neo4j:
    image: neo4j:5-community
    container_name: savemystomach-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${SAVEMYSTOMACH_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $NEO4J_AUTH_PASSWORD 'RETURN 1' || wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - savemystomach

volumes:
  neo4j_data:

networks:
  savemystomach:
    name: savemystomach
    driver: bridge
